project_name: hatexplain_v4b_hatebert_noweights

data:
  primary_dataset: hatexplain
  train_file: train.jsonl
  validation_file: validation.jsonl
  test_file: test.jsonl

task:
  type: classification
  num_classes: 3
  class_names:
    - hatespeech
    - normal
    - offensive

model:
  backbone: GroNLP/hateBERT
  max_length: 128
  dropout: 0.1

training:
  batch_size: 16
  learning_rate: 2e-5
  epochs: 3
  weight_decay: 0.01
  use_class_weights: false      # ablation: remove class weights, keep everything else identical to v4
  use_label_confidence: true
  use_focal_loss: true
  focal_gamma: 2.0
  warmup_ratio: 0.06
  max_grad_norm: 1.0

paths:
  raw_data_dir: data/raw
  interim_data_dir: data/interim
  processed_data_dir: data/processed
  results_dir: results/v4b_hatebert_noweights

experiment:
  phase: v4b_hatebert_noweights
  seed: 42
  use_rationales: false
  use_auxiliary_loss: false
